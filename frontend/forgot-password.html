<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>ลืมรหัสผ่าน | KITSUNE OMAKASE</title>
  <link rel="stylesheet" href="main.css">
</head>
<body>
  <div class="logo"><img src="/frontend/picture/logo.png" alt="Kitsune"></div>
  <form id="forgotForm" class="login-box">
    <h2>ลืมรหัสผ่าน</h2>
    <input id="email" type="email" placeholder="อีเมล" required>
    <button type="submit">ส่งลิงก์รีเซ็ตรหัสผ่าน</button>
    <p id="msg" style="text-align:center;color:#b92e2e;"></p>
  </form>

<script>
document.getElementById("forgotForm").addEventListener("submit", async e => {
  e.preventDefault();
  const email = document.getElementById("email").value.trim();
  const res = await fetch("http://127.0.0.1:8080/api/auth/forgot", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ email })
  });
  const data = await res.json();
  document.getElementById("msg").textContent = data.message || data.error;
});
</script>
</body>
</html>
