<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เข้าสู่ระบบ | KITSUNE OMAKASE</title>
  <link rel="stylesheet" href="main.css">
</head>
<body>
  <header>
    <div class="header-left"><img src="/frontend/picture/header.png" alt="logo"></div>
  </header>

  <div class="logo"><img src="/frontend/picture/logo.png" alt="Kitsune"></div>

  <form id="loginForm" class="login-box" onsubmit="login(event)">
    <h2>เข้าสู่ระบบ</h2>
    <input type="email" id="email" placeholder="อีเมล" required>
    <input type="password" id="password" placeholder="รหัสผ่าน" required>
    <div class="login-actions">
      <button type="submit">ยืนยัน</button>
    </div>
  </form>

<footer>
    <div class="footer-top">
      <div class="footer-left">
        <p>สุขุมวิท 39 อาคารพีเอ็ม ทาวเวอร์ ชั้น 2</p>
        <p>(เป็นบริการจองส่วนตัวและบริการจองแบบมาตรฐาน)</p>
        <p>เวลาเปิดทำการ</p>
        <p>โอมากาเสะ: 10.00 น. - 19.00 น.</p>
      </div>

      <div class="footer-right">
        <p>เบอร์โทรศัพท์</p>
        <p>(+66) 94-970-9780</p>
        <div class="social-icons">
          <img src="./img/line.png" alt="Line">
          <img src="./img/Facebook.png" alt="Facebook">
          <img src="./img/instagram.png" alt="Instagram">
        </div>
        <p>เวลาเปิดทำการ</p>
        <p>ปิดทุกวันหยุดนักขัตฤกษ์</p>
      </div>
    </div>

    <div class="footer-bottom">
      <img src="./picture/namelogo.png" alt="Kitsune Omakase Logo">
    </div>
  </footer>

  <!-- ───────── SCRIPT ───────── -->
  <script>
async function login(e) {
  e.preventDefault(); // ✅ ป้องกัน reload หน้า
  console.log("✅ login() ถูกเรียกแล้ว");

  try {
    const response = await fetch("https://omakase-backend-li58.onrender.com/api/staff/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        email: document.getElementById("email").value,
        password: document.getElementById("password").value
      }),
    });

    const data = await response.json();
    console.log("Response JSON:", data);

    if (response.ok && data.token) {
      localStorage.setItem("token", data.token);
      localStorage.setItem("staffName", data.staff.name);
      alert("เข้าสู่ระบบสำเร็จ!");
      window.location.href = "./ongoing.html";
    } else {
      alert(data.message || "เข้าสู่ระบบไม่สำเร็จ");
    }
  } catch (err) {
    console.error("Login error:", err);
    alert("เกิดข้อผิดพลาดระหว่างเข้าสู่ระบบ");
  }
}

function toggleMenu() {
  const menu = document.getElementById('menuOverlay');
  if (menu) menu.classList.toggle('active');
}
</script>

</body>
</html>
