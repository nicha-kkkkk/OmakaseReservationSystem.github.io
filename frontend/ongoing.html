<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KITSUNE OMAKASE - Dashboard</title>
<link rel="stylesheet" href="ongoing.css" />
<link rel="stylesheet" href="main.css">

</head>
<body>

<header>
  <div class="header-left">
    <img src="/frontend/picture/header.png" alt="logo" height="40">
  </div>
  <div class="header-right">
    <div class="notification" id="notif-icon">🔔<span id="new-count" class="badge">0</span></div>
    <div class="menu-icon" onclick="toggleMenu()">☰</div>
  </div>
</header>
<div class="menu-overlay" id="menuOverlay">
    <div class="menu-box">
      <span class="close-menu" onclick="toggleMenu()">✕</span>
      <ul>
        <li><a href="./ongoing.html">หน้าแรก</a></li>
        <li><a href="./HistoryAdmin/historyAdmin.html">ประวัติการจองทั้งหมด</a></li>
        <li><a href="./foodList.html">แก้ไขเมนู</a></li>
        <li><a href="./loginEmployee.html" class="logout">ออกจากระบบ</a></li>
      </ul>
    </div>
  </div>


<div class="menu-overlay" id="menuOverlay">
  <div class="menu-box">
    <span class="close-menu" onclick="toggleMenu()">✕</span>
    <ul>
      <li><a href="./ongoing.html">หน้าแรก</a></li>
      <li><a href="./HistoryAdmin/historyAdmin.html">ประวัติการจองทั้งหมด</a></li>
      <li><a href="./foodList.html">แก้ไขเมนู</a></li>
      <li><a href="./loginEmployee.html" class="logout">ออกจากระบบ</a></li>
    </ul>
  </div>
</div>

<section class="notification-section">
  <h2>แจ้งเตือนการจอง <span id="new-count-main" class="badge">0</span></h2>
  <div id="notification-list">
    <p>กำลังโหลดข้อมูลแจ้งเตือน...</p>
  </div>
</section>

<div class="month-container">
  <img src="/frontend/image/arrowLeft.png" alt="" class="arrow-left" onclick="monthLeftClick()"/>
  <span id="month"></span>
  <img src="/frontend/image/arrowRight.png" alt="" class="arrow-right" onclick="monthRightClick()"/>
</div>

<div id="day-container"></div>
<div id="ongoing-container"></div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script>
/* ─────────── Menu ─────────── */
function toggleMenu() {
  const menu = document.getElementById("menuOverlay");
  menu.classList.toggle("active");
}
document.querySelectorAll(".logout").forEach(btn => btn.addEventListener("click", () => {
  localStorage.clear(); window.location.href="./loginEmployee.html";
}));

/* ─────────── Notifications ─────────── */
let notifications = [];
let confirmedReservations = JSON.parse(localStorage.getItem("confirmedReservations") || "[]");

async function fetchNotifications() {
  try {
    const res = await axios.get("https://omakase-backend-li58.onrender.com/api/admin/reservations/notifications");
    if (res.data.status === "success") {
      const fetched = res.data.notifications.map(n => ({ ...n, isNew: !n.isRead }));
      const unique = [];
      const seen = new Set();
      for (const n of fetched) {
        const confirmKey = `${n.reservation_id}_${n.type}`;
        if (!seen.has(confirmKey) && !confirmedReservations.includes(confirmKey)) {
          unique.push(n);
          seen.add(confirmKey);
        }
      }
      notifications = unique;
      renderNotifications();
    } else { 
      document.getElementById("notification-list").innerHTML="<p>ไม่พบแจ้งเตือน</p>"; 
    }
  } catch (err) {
    console.error(err);
    document.getElementById("notification-list").innerHTML="<p>เกิดข้อผิดพลาดในการโหลดข้อมูล</p>";
  }
}

function renderNotifications() {
  const container = document.getElementById("notification-list");
  container.innerHTML = "";
  const newCount = notifications.filter(n=>n.isNew).length;
  document.getElementById("new-count").textContent = newCount;
  document.getElementById("new-count-main").textContent = newCount;

  if(notifications.length===0){container.innerHTML="<p>ไม่มีแจ้งเตือน</p>"; return;}

  notifications.forEach(n=>{
    const card = document.createElement("div");
    card.className = "notification-card" + (n.isNew?" new":"");

    let typeLabel="", confirmText="", confirmEndpoint="";
    switch(n.type){
      case "new_reservation":
        typeLabel="จองใหม่";
        confirmText="ยืนยันการจอง";
        confirmEndpoint=`https://omakase-backend-li58.onrender.com/api/admin/reservations/${n.reservation_id}/confirm`;
        break;
      case "reschedule":
        typeLabel="เลื่อนวันจอง";
        confirmText="ยืนยันการเลื่อน";
        confirmEndpoint=`https://omakase-backend-li58.onrender.com/api/admin/reservations/${n.reservation_id}/reschedule/confirm`;
        break;
      case "reschedule_confirmed":
        typeLabel="เลื่อนวันจอง (ยืนยันแล้ว)";
        confirmText="ยืนยันแล้ว";
        confirmEndpoint=null; 
        break;
      default:
        typeLabel="แจ้งเตือนทั่วไป";
        confirmText="";
        confirmEndpoint=null;
    }

    card.innerHTML = `<h3>${typeLabel} - ${n.course_name||"-"}</h3>
      <p>ลูกค้า: ${n.user_name||"-"}</p>
      <p>วันที่: ${n.date||"-"} เวลา: ${n.reservation_hour||"-"}</p>
      <span class="view-details">ดูรายละเอียด</span>
      <div class="button-container" style="margin-top:8px;"></div>
      <div class="extra-info">
        <p>อีเมล: ${n.user_email||"-"}</p>
        <p>เบอร์โทร: ${n.user_phone||"-"}</p>
        <p>จำนวนคน: ${n.number_of_people||"-"}</p>
        <p>ราคา: ${n.total_price||"-"} บาท</p>
      </div>`;

    const btn = card.querySelector(".view-details");
    const extra = card.querySelector(".extra-info");
    const btnContainer = card.querySelector(".button-container");

    if(confirmText && confirmEndpoint){
      const confirmBtn = document.createElement("button");
      confirmBtn.className = "confirm-btn"; 
      confirmBtn.textContent = confirmText;
      btnContainer.appendChild(confirmBtn);

      confirmBtn.addEventListener("click", async () => {
        const confirmMsg = n.type==="reschedule" ?
          "ยืนยันการเลื่อนและส่ง Email ไปยังลูกค้า?" :
          "ยืนยันการจองและส่ง Email ไปยังลูกค้า?";

        if(confirm(confirmMsg)){
          try{
            const res = await axios.put(confirmEndpoint);
            console.log("Confirm response:", res.data);
            if(res.data?.status==="success" || res.status===200){
              const confirmKey = `${n.reservation_id}_${n.type}`;
              confirmedReservations.push(confirmKey);
              localStorage.setItem("confirmedReservations", JSON.stringify([...new Set(confirmedReservations)]));
              notifications = notifications.filter(item => `${item.reservation_id}_${item.type}` !== confirmKey);
              renderNotifications();
              alert(res.data?.message || "ยืนยันสำเร็จ");
            } else {
              alert(res.data?.message || "เกิดข้อผิดพลาด แต่ Email ถูกส่งแล้ว");
            }
          } catch(err){
            console.error(err.response?.data || err);
            alert("เกิดข้อผิดพลาดในการยืนยันจริง ๆ");
          }
        }
      });
    }

    // แก้ตรงนี้: ดูรายละเอียดจะไม่ปิดอัตโนมัติ
    btn.addEventListener("click", ()=>{
      if(extra.style.display==="none"){
        extra.style.display="block";
        btn.textContent="ปิดรายละเอียด"; 
      } else {
        extra.style.display="none";
        btn.textContent="ดูรายละเอียด"; 
      }
    });

    container.appendChild(card);
  });
}

/* ─────────── Calendar + Ongoing Reservations ─────────── */
const month = document.getElementById("month");
const currentDate = new Date();
let currentMonthCounter = currentDate.getMonth();
let currentYearCounter = currentDate.getFullYear();
const dayList = ["อาทิตย์","จันทร์","อังคาร","พุธ","พฤหัสบดี","ศุกร์","เสาร์"];
const monthList = ["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];
let allDates=[], groupDays=[], selectGroup=[], selectGroupIndex=0;
let lastSelectedDay=null, lastSelectedMonth=null, lastSelectedYear=null;

function getAllDate(){ allDates=[]; const daysInMonth=new Date(currentYearCounter,currentMonthCounter+1,0).getDate();
for(let day=1;day<=daysInMonth;day++){ const d=new Date(currentYearCounter,currentMonthCounter,day); allDates.push({วันที่:day,วัน:dayList[d.getDay()],เดือน:monthList[currentMonthCounter],ปี:currentYearCounter+543}); } }

function groupDaysInMonth(param){ const groups=[]; for(let i=1;i<=param;i+=5){ const group=[]; for(let j=i;j<i+5&&j<=param;j++) group.push(j); groups.push(group); } return groups; }
function rebuildGroups(){ groupDays=groupDaysInMonth(allDates.length); selectGroupIndex=0; selectGroup=groupDays[selectGroupIndex]; }
function showMonth(){ if(month) month.innerHTML=monthList[currentMonthCounter]+" "+(currentYearCounter+543); }
function monthLeftClick(){ currentMonthCounter=(currentMonthCounter===0?11:currentMonthCounter-1); if(currentMonthCounter===11) currentYearCounter--; getAllDate(); rebuildGroups(); showMonth(); showDate(); }
function monthRightClick(){ currentMonthCounter=(currentMonthCounter===11?0:currentMonthCounter+1); if(currentMonthCounter===0) currentYearCounter++; getAllDate(); rebuildGroups(); showMonth(); showDate(); }
function dayLeftClick(index){ if(index<0) return; selectGroupIndex=index; selectGroup=groupDays[selectGroupIndex]; showDate(); }
function dayRightClick(index){ if(index>=groupDays.length) return; selectGroupIndex=index; selectGroup=groupDays[selectGroupIndex]; showDate(); }
function showDate(){ if(!selectGroup||selectGroup.length===0) return;
  let dayCard=selectGroup.map(day=>{ const dateObj=allDates[day-1]; if(!dateObj) return ''; const onclickParam=`${dateObj.วันที่},${currentMonthCounter},${currentYearCounter}`;
    return `<div class="day-card" id="day-${dateObj.วันที่}" onclick="selectDay(${onclickParam})"><span>${dateObj.วันที่}</span><span>${dateObj.วัน}</span></div>`;
  }).join('');
  const leftArrow=`<img src="/frontend/image/arrowLeft.png" alt="Left" class="arrow-left" onclick="dayLeftClick(${selectGroupIndex-1})"/>`;
  const rightArrow=`<img src="/frontend/image/arrowRight.png" alt="Right" class="arrow-right" onclick="dayRightClick(${selectGroupIndex+1})"/>`;
  const container=document.getElementById("day-container");
  if(container) container.innerHTML=leftArrow+dayCard+rightArrow;
}

function selectDay(dayparam,monthparam,yearparam){ lastSelectedDay=dayparam; lastSelectedMonth=monthparam; lastSelectedYear=yearparam;
  document.querySelectorAll(".day-card").forEach(el=>el.classList.remove("active-day"));
  const el=document.getElementById(`day-${dayparam}`);
  if(el) el.classList.add("active-day");
  showOngoing(dayparam,monthparam,yearparam);
}

function showOngoing(dayparam,monthparam,yearparam){
  axios.get("https://omakase-backend-li58.onrender.com/api/admin/reservations/all")
  .then(res=>{
    if(res.data.status==="success"){
      const reservations=res.data.reservations;
      const filtered=reservations.filter(r=>{
        const rDate=new Date(r.reservation_time);
        return rDate.getDate()===dayparam&&rDate.getMonth()===monthparam&&rDate.getFullYear()===yearparam;
      });
            // ✅ เรียงรายการตามเวลาเริ่มต้น เช่น 11:00 -> 13:00 -> 18:30
      filtered.sort((a, b) => {
        const timeA = a.reservation_hour.split("-")[0].trim();
        const timeB = b.reservation_hour.split("-")[0].trim();
        const [hA, mA] = timeA.split(":").map(Number);
        const [hB, mB] = timeB.split(":").map(Number);
        return hA !== hB ? hA - hB : mA - mB;
      });

      const container=document.getElementById("ongoing-container");
      if(!container) return;
      if(filtered.length===0){ container.innerHTML="<p>ไม่มีการจองในวันนี้</p>"; return; }

      let html="";
      for(let item of filtered){
        const user=item.user_id;
        const timeIn=item.reservation_hour.split("-")[0];
        const timeOut=item.reservation_hour.split("-")[1];
        html+=`<div class="ongoing-card" id="ongoing-card-${item._id}">
          <div class="open-card">
            <div><strong>${timeIn}</strong> - ${item.course_name}</div>
            <div>ชื่อ: ${user.name} | จำนวนคน: ${item.number_of_people} | ราคา: ${item.total_price} บาท</div>
            <a href="#" class="view-more" data-id="${item._id}">ดูเพิ่มเติม</a>
            <div class="extra-details" id="extra-${item._id}" style="display:none;">
              <p>อีเมล: ${user.email||"-"}</p>
              <p>เบอร์โทร: ${user.phone||"-"}</p>
              <p>อาหารแพ้: ${item.allergies?.join(",")||"ไม่มี"}</p>
              <p>แทนอาหาร: ${item.selected_menu?.join(",")||"ให้ร้านจัดการเลือก"}</p>
              <p>สถานะ: ${item.status||"-"}</p>
              <button class="checkin-btn">${item.checkin_status==="เช็คอินแล้ว"?"เช็คอินแล้ว":"เช็คอิน"}</button>
            </div>
          </div>
        </div>`;
      }
      container.innerHTML=html;

      document.querySelectorAll(".view-more").forEach(btn=>{
        btn.addEventListener("click",e=>{
          e.preventDefault();
          const id=btn.dataset.id;
          const extra=document.getElementById(`extra-${id}`);
          if(!extra) return;
          if(extra.style.display==="none"){ extra.style.display="block"; btn.textContent="ปิดรายละเอียด"; }
          else{ extra.style.display="none"; btn.textContent="ดูเพิ่มเติม"; }
        });
      });

      document.querySelectorAll(".checkin-btn").forEach(btn=>{
        btn.addEventListener("click",async ()=>{
          const id=btn.parentElement.id.replace("extra-","");
          if(btn.textContent==="เช็คอิน"){
            if(confirm("ยืนยันเช็คอินลูกค้ารายนี้?")){
              try{
                await axios.put(`https://omakase-backend-li58.onrender.com/api/admin/reservations/${id}/checkin`,{ checkin_status:"เช็คอินแล้ว" });
                btn.textContent="เช็คอินแล้ว";
              }catch(err){ console.error(err); alert("เกิดข้อผิดพลาดในการเช็คอิน"); }
            }
          }
        });
      });

    } else { console.log("No reservations"); }
  })
  .catch(err=>console.error(err));
}

getAllDate(); rebuildGroups(); showMonth(); showDate();
fetchNotifications();
</script>
</body>
</html>
