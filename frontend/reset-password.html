<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>ตั้งรหัสผ่านใหม่ | KITSUNE OMAKASE</title>
  <link rel="stylesheet" href="main.css">
</head>
<body>
  <div class="logo"><img src="/frontend/picture/logo.png" alt="Kitsune"></div>
  <form id="resetForm" class="login-box">
    <h2>ตั้งรหัสผ่านใหม่</h2>
    <input id="password" type="password" placeholder="รหัสผ่านใหม่" required>
    <input id="confirm" type="password" placeholder="ยืนยันรหัสผ่าน" required>
    <button type="submit">ยืนยัน</button>
    <p id="msg" style="text-align:center;color:#b92e2e;"></p>
  </form>

<script>
function getQuery() {
  return Object.fromEntries(new URLSearchParams(location.search).entries());
}
const params = getQuery();

document.getElementById("resetForm").addEventListener("submit", async e => {
  e.preventDefault();
  const password = document.getElementById("password").value;
  const confirm = document.getElementById("confirm").value;
  if (password !== confirm) { alert("รหัสผ่านไม่ตรงกัน"); return; }
  if (password.length < 8) { alert("รหัสผ่านต้องอย่างน้อย 8 ตัว"); return; }

  const res = await fetch("http://127.0.0.1:8080/api/auth/reset", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ token: params.token, email: params.email, password })
  });
  const data = await res.json();
  if (!res.ok) {
    document.getElementById("msg").textContent = data.error || "เกิดข้อผิดพลาด";
  } else {
    alert(data.message || "เปลี่ยนรหัสผ่านเรียบร้อย");
    window.location = "login.html";
  }
});
</script>
</body>
</html>
